<!DOCTYPE html>
<html>
<head>
    <title>Safety Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #map {
            height: 500px;
            margin: 20px;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>🗺️ Safety Map (AI Risk Visualization)</h2>

<p style="font-weight:bold;">
🔴 High Risk | 🟡 Medium Risk | 🟢 Low Risk | 🔵 COER Campus
</p>

<button onclick="toggleHeatmap()">Toggle Heatmap</button>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Heatmap Plugin -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

var map = L.map('map').setView([22, 78], 5); // India view

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

let heatLayer;
let markers = [];

// Fetch data
fetch('/get_reports')
.then(res => res.json())
.then(data => {

    let heatPoints = [];

    data.forEach(item => {

        // 🔥 Heat points
        heatPoints.push([item.lat, item.lng, 1]);

        // 🎯 Marker color logic
        let color = item.color;

        // 🔵 Highlight COER
        if(item.message.toLowerCase().includes("coer")){
            color = "blue";
        }

        let marker = L.circleMarker([item.lat, item.lng], {
            color: color,
            radius: 8,
            fillOpacity: 0.7
        })
        .addTo(map)
        .bindPopup(
            "<b>Category:</b> " + item.category +
            "<br><b>Report:</b> " + item.message
        );

        markers.push(marker);
    });

    // 🔥 Heatmap
    heatLayer = L.heatLayer(heatPoints, {
        radius: 40,
        blur: 25
    }).addTo(map);
});

// 🔁 Toggle Heatmap
function toggleHeatmap() {
    if (map.hasLayer(heatLayer)) {
        map.removeLayer(heatLayer);
    } else {
        map.addLayer(heatLayer);
    }
}

</script>

</body>
</html>
